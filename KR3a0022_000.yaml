body:
  text: 儒志編儒家類提要臣等謹案儒志編一卷宋王開祖撰開祖字景山永嘉人皇祐五年進士試秘書省校書郎佐處州麗水縣既而退居郡城東山設塾授徒從受業者常數百人學者尊之為儒志先生年三十二而卒宋史不為立傳其著作亦多湮没不傳是編乃其生平講學之語明王循守永嘉時蒐訪遺佚為之編輯以行開祖當北宋仁宗時濓洛之説未興講學者猶家自為説雖賢如司馬光猶不免有疑孟之作而開祖獨毅然奮起以講明聖道為事雖其立説未必能盡歸精當而闡明理道不惑岐趨不可謂非豪傑之士也循字進之休寧人𢎞治丙辰進士所著有仁峯集其篤行好學亦有足稱者云乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀儒志編原序士有起於鄒魯不傳之後濓洛未倡之先卓有知而能自立於世者其豪傑之士矣乎道之在天下未嘗亡而託於人者不能不墜是故因人而覺者易先民而知者難昔韓退之著原道而謂軻死不得其傳程子謂其非卓然見其所傳者語不及此而以豪傑之士稱之然退之不過因文以致道力求所未至而有所得焉者也矧能真見天人性命之理入道勝復之功措之言語文字之間平正精實先得周子易通之近似如永嘉先哲王氏景山者不謂之豪傑之士可乎景山舉進士以所如者不合退與其徒講明理學所著僅存者此編尤復闕略失次司教清源諸葛文敏叅諸王氏譜諜中手自校正間以示予予謂自軻氏之説不傳儒者之言大勢凡三變在戰國之時秦漢之間若孫呉蘇張范蔡荀列之徒韓李陸賈劉班下至嚴安徐樂之輩不求知道養徳以充其内惟務騁辭衒術以競乎外君子羞之然猶皆必先有其實而後託之於言也再變而至宋玉相如王褒揚䧺之流則一以浮華為尚沿及隋唐愈衰愈下徒託空言而無實矣三變而唐韓愈氏宋歐陽氏先後相望號於一世儒者宗之其言不為無見但未免以文章明道裂為兩物卒不能復乎古也五星聚奎文運天作濓溪者出建圖著書闡發幽秘即斯人日用常行之際示學者窮理盡性之歸上接洙泗下啟伊洛者孟氏之後一人而已景山前此而起無所觀望倚藉而能不以近代儒宗之所習者為師超然心領神㑹於千載之上言皆治國修身之要見匪扣盤捫燭之為如斯人者豈易得哉其言曰孟子以來道學不明吾欲述堯舜之道論文武之治杜淫邪之路闢皇極之門非有所見而能為是哉所恨僻處海隅不能廣其傳於天下撫卷之餘豈勝感歎循顧何人而足為公輕重哉竊禄是邦表章乃職故不敢不竭此心敬序諸首鋟梓以傳而自不知其為固陋也𢎞治己未八月中秋日新安汪循序
