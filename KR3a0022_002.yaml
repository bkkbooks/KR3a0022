body:
  text: 儒志學業傳皇祐賢良儒志先生王景山諱開祖少敏悟書經目輒成誦勤篤廢寢食初習制科以所業上召試皇祐五年中第三甲進士第洪氏登科記云是年應制科者十有八人宰相不曾留意取士密諭考官只放一人過閣下試六論賢良趙彥若中選及對䇿又黜之是年制科並不取人景山幡然不調而歸盡焚舊作縱觀經史百家之書考别差殊與學者共講之席下常數百人尊之曰儒志先生未幾而卒年三十二其所著書多不出惟儒志一編門弟子傳習今其書首章言復者性之宅無妄者誠之原又曰學者離性而言情奚情之不惡又曰使孔子用於當時六經之道不若今之著矣㫖意若此者衆君子評其為知德之奧最末章曰由孟子以來道學不明吾欲述堯舜之道論文武之治杜淫邪之路闢皇極之門吾畏諸天者也吾何敢已哉是其自負豈淺淺者當慶厯皇祐間宋興來百年經術道微伊洛先生未作景山獨能研精覃思發明經藴倡鳴道學二字著之話言此永嘉理學開山祖也不幸有則亡之嘆後四十餘年伊洛儒宗始出從游諸公還鄉轉相授受理學益行而濫觴亦有自焉紹熙二年春朝請大夫寶謨閣待制永嘉後學陳謙撰儒志像贊公諱開祖字景山登皇祐癸巳鄭獬榜進士第試祕書省校書郎出佐處州麗水縣既而不樂退居郡城東山設孰倡鳴理學於濓洛未作之先講下常數百人年三十二而卒學者尊之曰儒志先生為永嘉道學開山祖著儒志一編以貽後人及之嘗僭為序因拜公遺像景仰髙風敬為之贊云溫乎其容淵乎其中含英萃精玉藴金舂灝然正大光明之氣倡為理學道統之宗著儒志一編而首言復性對賢良三䇿而致力厥𠂻試祕書而才猷允懋寄民社而治績尤隆倦從事恬退東山之麓開來學大施時雨之功其生也時當濓洛未作其沒也年若洙泗令終噫是宜二學立祠尊為先賢之首位名與斗山而並崇也宋乾道壬辰春知樞密院參知政事同里許及之拜書陽春其盎良玉其溫扶輿所鍾噩噩渾渾東山講道學者是尊當伊洛之未作承洙泗之淵源杜淫邪路闢皇極門儒志一編闡道之原賢良三䇿衛道之垣功扶世教澤裕後昆使天假年安知其不扣聖人之幽閽也邪元泰定丙寅夏五月望後三日正議大夫海北海南道肅政亷訪使後學王都中謹書永嘉賢良王公遺書跋伯衡年十二三側聞鄉之逹尊言宋時永嘉人物之盛道術之懿固莫加於乾淳之際尚論其所由來實出皇祐賢良王公景山且盛稱公學術議論文章卓然過人伯衡私念公之在宋仕不登於朝化不行於國而數百年之下言濬斯道之源者屬之公焉必有大過人者矣自是㑹永嘉學士大夫輒從問公遺書皆以為髙文大册散落無存間存一二亦不多見伯衡未嘗不嘆惋久之兹過永嘉辱友公九世孫淵始得見其家藏儒志編若干首劉屯田戴惟嶽二墓文觀是書雖不能盡知公因文以求義因迹以求用亦足以得其緒餘矣於戲慶厯之前固有斯人乎鄉逹尊豈欺我哉使假之以年䆒極髙妙得志當時則其道不既昌大矣乎談者安得謂六經羣聖人之道至濓溪橫渠明道伊川諸子出而後復明又安得謂五代文詞之習至歐陽永叔尹師魯梅聖俞蘇子美諸公作而後丕變也惜乎公年三十有二而遽卒庸非天乎雖然揚子雲有言存則人亡則書而近世胡汲仲又廣之曰千古聖賢之道由斯文而知之後乎千古亦將由斯文而知今之道夫上下千古其人不相及矣必於其書而知其道焉則公之遺書何可以不傳也淵圖重刻以嘉惠後學不亦宜乎抑豈不以學術之在一家一邦不若公之天下也歟此君子之用心也伯衡既幸得見少償素願又重淵克承家學無愧為人後忘其寡陋識於篇末而翹翹望焉洪武庚戌春三月甲子翰林院國史編修致仕眉山蘇伯衡識
